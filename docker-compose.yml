version: "3.8"

services:
  bot:
    build: .
    container_name: schedule_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    container_name: schedule_bot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-schedule_bot}
      POSTGRES_USER: ${DB_USER:-bot_user}
      POSTGRES_PASSWORD: ${DB_PASS:-bot_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_user} -d ${DB_NAME:-schedule_bot}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
